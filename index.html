<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Morphing - Heart to Text</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* UI overlay matches the mobile UI in the video */
        .ui-container {
            position: absolute;
            bottom: 12%;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: none;
        }
        .input-wrapper {
            position: relative;
            width: 80%;
            pointer-events: auto;
        }
        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 10px 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: rgba(255, 105, 180, 0.6);
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
        }
        button {
            pointer-events: auto;
            background: #ff1493;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            background: #ff69b4;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <div class="input-wrapper">
            <input type="text" id="text-input" value="AxtarGet" autocomplete="off" placeholder="Type something...">
        </div>
        <button id="morph-btn">Morph Shape</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- CONSTANTS & CONFIG ---
        const PARTICLE_COUNT = 60000;
        const NEON_PINK = '#ff2a8d';

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        container.appendChild(renderer.domElement);

        // --- POST PROCESSING (BLOOM GLOW) ---
        const renderPass = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.4, 0.1);
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        // --- SHADER MATERIAL FOR PARTICLES ---
        const vertexShader = `
            uniform float uProgress;
            uniform float uTime;
            attribute vec3 aTarget;
            attribute float aSize;
            varying vec3 vPosition;

            // Simple noise generator for organic movement
            float hash(float n) { return fract(sin(n) * 43758.5453123); }
            
            void main() {
                vPosition = position;
                
                // Add ambient subtle waving/organic noise based on time
                vec3 noiseSource = mix(position, aTarget, uProgress);
                float noiseX = sin(noiseSource.y * 0.1 + uTime * 0.5) * 0.3;
                float noiseY = cos(noiseSource.x * 0.1 + uTime * 0.5) * 0.3;
                vec3 noise = vec3(noiseX, noiseY, 0.0);

                // Linearly interpolate between Heart position and Text position
                vec3 mixedPosition = mix(position, aTarget, uProgress) + noise;
                
                vec4 mvPosition = modelViewMatrix * vec4(mixedPosition, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                // Size attenuation (particles look larger when closer to camera)
                gl_PointSize = aSize * (300.0 / -mvPosition.z);
            }
        `;

        const fragmentShader = `
            uniform vec3 uColor;
            void main() {
                // Make particles perfectly circular instead of blocky squares
                float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                if (distanceToCenter > 0.5) discard;
                
                // Soft gradient edges for nicer glow integration
                float strength = 1.0 - (distanceToCenter * 2.0);
                gl_FragColor = vec4(uColor, strength);
            }
        `;

        const particleMaterial = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: {
                uProgress: { value: 0.0 },
                uTime: { value: 0.0 },
                uColor: { value: new THREE.Color(NEON_PINK) }
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        // --- GEOMETRY SETUP ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targets = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);

        // Populate Shape A: 3D Heart Geometry (Mathematical Formula)
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Generate coordinates using the Taubin Heart Equation
            const t = Math.PI * (Math.random() * 2.0 - 1.0);
            const phi = Math.PI * (Math.random() * 2.0 - 1.0);

            // Scale factor to make it visualizable in 3D
            const scale = 1.2; 
            
            // Heart Equation
            const x = 16 * Math.pow(Math.sin(t), 3.0) * scale;
            const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
            const z = (Math.sin(phi) * Math.abs(x) * 0.4); // Add depth dimension to the heart

            positions[i * 3] = x;
            positions[i * 3 + 1] = y + 2; // Center offset adjustment
            positions[i * 3 + 2] = z;

            // Random variations in dot sizes
            sizes[i] = Math.random() * 0.15 + 0.05;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aTarget', new THREE.BufferAttribute(targets, 3));
        geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

        const particleSystem = new THREE.Points(geometry, particleMaterial);
        scene.add(particleSystem);

        // --- TEXT TARGET COORDINATES GENERATOR ---
        // Generates point clouds from text via a hidden Canvas 2D
        function generateTextPositions(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = 256;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Text configuration matches the bold aesthetic in the video
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 130px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const textPixels = [];

            // Sample pixels that are white (where text is written)
            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x += 2) {
                    const index = (y * canvas.width + x) * 4;
                    if (imgData[index] > 128) {
                        textPixels.push({
                            x: (x - canvas.width / 2) * 0.065,
                            y: -(y - canvas.height / 2) * 0.065,
                            z: (Math.random() - 0.5) * 1.5 // Adds depth dispersion to the text
                        });
                    }
                }
            }

            // Assign the text positions to the WebGL target attribute buffer
            const targetAttribute = geometry.attributes.aTarget.array;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // If there are fewer text sample points than particles, wrap around
                const pt = textPixels[i % textPixels.length];
                targetAttribute[i * 3] = pt.x;
                targetAttribute[i * 3 + 1] = pt.y;
                targetAttribute[i * 3 + 2] = pt.z;
            }
            geometry.attributes.aTarget.needsUpdate = true;
        }

        // Initialize default text target positions
        generateTextPositions("AxtarGet");

        // --- ANIMATION CONTROLS ---
        let currentShape = 0; // 0 = Heart, 1 = Text
        const inputField = document.getElementById('text-input');
        const actionBtn = document.getElementById('morph-btn');

        function triggerMorph() {
            if (currentShape === 0) {
                // Regen target configuration from current input value
                generateTextPositions(inputField.value.trim() || "AxtarGet");
                
                // Use GSAP to interpolate the uProgress uniform variable to 1
                gsap.to(particleMaterial.uniforms.uProgress, {
                    value: 1.0,
                    duration: 2.2,
                    ease: "power4.inOut"
                });
                actionBtn.textContent = "Reset to Heart";
                currentShape = 1;
            } else {
                // Interpolate back to 0 (Heart position)
                gsap.to(particleMaterial.uniforms.uProgress, {
                    value: 0.0,
                    duration: 2.2,
                    ease: "power4.inOut"
                });
                actionBtn.textContent = "Morph Shape";
                currentShape = 0;
            }
        }

        actionBtn.addEventListener('click', triggerMorph);

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            particleMaterial.uniforms.uTime.value = elapsedTime;

            // Subtle rotation of the global camera viewport for cinematic effect
            particleSystem.rotation.y = Math.sin(elapsedTime * 0.15) * 0.1;
            particleSystem.rotation.x = Math.cos(elapsedTime * 0.1) * 0.05;

            composer.render();
        }
        animate();

        // --- RESPONSIVENESS HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
